<!-- @dsCard group="Type" viewport="700x230" name="Newsreader — editorial serif" subtitle="Wordmark, page titles, and aisle headers" -->
<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 12px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-300); width: 130px; flex: none; }
  .spec { font-family: var(--font-display); color: var(--ink-900); line-height: 1.1; }
</style></head>
<body>
<div class="row"><span class="meta">38 / 500</span><span class="spec" style="font-size:38px">Saturday grocery run</span></div>
<div class="row"><span class="meta">24 / 500</span><span class="spec" style="font-size:24px">Vegetables</span></div>
<div class="row"><span class="meta">24 / 500 italic</span><span class="spec" style="font-size:24px;font-style:italic;color:var(--tomato-500)">Grocery</span></div>
<div class="row"><span class="meta">18 / 400</span><span class="spec" style="font-size:18px;font-weight:400">Everything the household needs, in one shared list.</span></div>
</body></html>
