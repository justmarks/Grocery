<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .grid { display: grid; grid-template-columns: 280px 1fr; gap: 24px; align-items: center; }
  .toaststage { position: relative; height: 220px; background: var(--paper-200); border-radius: var(--radius-lg); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 18px; }
  /* Toast is position:fixed; scope it to the stage for the specimen. */
  .toaststage .gr-toast { position: static !important; transform: none !important; opacity: 1 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Toast, EmptyState, Button } = window.GroceryDesignSystem_df55be;
  function Card() {
    return (
      <div className="grid">
        <div className="toaststage">
          <Toast visible={true}>Added to Costco list</Toast>
        </div>
        <EmptyState icon="shopping-cart" title="Your list is empty"
          action={<Button icon="plus">Add the first item</Button>}>
          Add items as you think of them, or import a meal plan from RecipeTracker.
        </EmptyState>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
</script>
</body>
</html>
