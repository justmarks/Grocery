<!-- @dsCard group="Components" viewport="700x470" name="Grocery — List rows, aisles, mode toggle, store filter" subtitle="The domain primitives: rows, aisle headers, Plan/Shop toggle, store pills" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .lbl { font-family: var(--font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-300); margin-bottom: 10px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .listcard { background: var(--bg-card); border-radius: var(--radius-lg); padding: 8px 12px 12px; box-shadow: var(--shadow-sm); }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { CategoryTag, AisleHeader, GroceryItemRow, ModeToggle, StoreFilter, IconButton } = window.GroceryDesignSystem_df55be;
  const CATS = ["fruits","vegetables","meats","dairy","cheeses","baking-and-dry-goods","bread-and-crackers","beverages","paper-goods","freezer","misc"];
  function Card() {
    const [mode, setMode] = React.useState("shop");
    const [store, setStore] = React.useState("all");
    const [done, setDone] = React.useState({ a: false, b: true, c: false });
    return (
      <div className="stack">
        <div className="row" style={{ justifyContent: "space-between" }}>
          <ModeToggle value={mode} onChange={setMode} />
          <StoreFilter stores={["Trader Joe's", "Costco", "QFC"]} value={store} onChange={setStore} />
        </div>
        <div>
          <div className="lbl">Category chips</div>
          <div className="row" style={{ gap: 8 }}>
            {CATS.map((c) => <CategoryTag key={c} category={c} />)}
          </div>
        </div>
        <div className="listcard">
          <AisleHeader category="vegetables" count={2} />
          <GroceryItemRow text="Yellow onions (3 medium)" quantity={3} stores={["QFC"]}
            checked={done.a} onToggle={() => setDone(s => ({ ...s, a: !s.a }))}
            trailing={mode === "plan" ? <IconButton icon="pencil" aria-label="Edit" /> : null} />
          <GroceryItemRow text="Romaine hearts" stores={["Trader Joe's", "Costco"]}
            checked={done.b} onToggle={() => setDone(s => ({ ...s, b: !s.b }))} />
          <AisleHeader category="freezer" count={1} />
          <GroceryItemRow text="Frozen peas" stores={["Costco"]}
            checked={done.c} onToggle={() => setDone(s => ({ ...s, c: !s.c }))} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
</script>
</body>
</html>
