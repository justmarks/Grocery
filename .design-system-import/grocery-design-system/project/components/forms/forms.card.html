<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .lbl { font-family: var(--font-sans); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-300); margin-bottom: 10px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Field, Checkbox } = window.GroceryDesignSystem_df55be;
  function Card() {
    const [a, setA] = React.useState(true);
    const [b, setB] = React.useState(false);
    return (
      <div>
        <div className="cols">
          <Field label="Item" hint="What you'll see at the shelf">
            <Input placeholder="Lemons" defaultValue="Yellow onions" />
          </Field>
          <Field label="Aisle">
            <Select defaultValue="vegetables">
              <option value="fruits">Fruits</option>
              <option value="vegetables">Vegetables</option>
              <option value="meats">Meats</option>
            </Select>
          </Field>
          <Field label="Count" error="Must be at least 1">
            <Input type="number" defaultValue={0} />
          </Field>
          <div>
            <div className="lbl">Checkoff</div>
            <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
              <Checkbox checked={a} onChange={setA} />
              <Checkbox checked={b} onChange={setB} />
              <Checkbox checked={false} onChange={() => {}} size={36} />
              <span className="caption">tap to toggle</span>
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Card />);
</script>
</body>
</html>
