<!-- @dsCard group="Grocery App" viewport="430x880" name="Grocery — the shared list app" subtitle="Interactive PWA: plan, shop, import, share" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grocery — Marks Family</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% 0%, var(--paper-200), var(--paper-100) 60%);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
  }

  /* ---------- Phone frame ---------- */
  .gk-phone {
    width: 390px;
    height: 820px;
    max-height: calc(100dvh - 48px);
    background: var(--bg-page);
    border-radius: 38px;
    box-shadow: var(--shadow-lg), 0 0 0 10px #221912, 0 0 0 11px #3a2c20;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ---------- App layout ---------- */
  .gk-app { display: flex; flex-direction: column; height: 100%; position: relative; }

  /* Toast scoped to the phone, not the viewport. */
  .gk-app .gr-toast {
    position: absolute !important;
    bottom: 88px !important;
  }

  .gk-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 12px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-faint);
  }
  .gk-topbar__right { display: flex; align-items: center; gap: 6px; }
  .gk-avatars { display: flex; align-items: center; }
  .gk-avatars > * + * { margin-left: -8px; }
  .gk-avatars > span,
  .gk-avatars :where(.gr-avatar) { box-shadow: 0 0 0 2px var(--bg-elevated); }
  .gk-avatars__more {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: var(--radius-pill);
    background: var(--paper-300); color: var(--ink-700);
    font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    margin-left: -8px; box-shadow: 0 0 0 2px var(--bg-elevated);
  }

  .gk-modebar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    gap: 12px;
  }
  .gk-listmeta { white-space: nowrap; }

  .gk-main { flex: 1; min-height: 0; display: flex; flex-direction: column; }

  /* Scroll region shared by Plan + Shop. */
  .gk-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 0 12px; }
  .gk-aisle-group { margin-bottom: 14px; }
  .gk-aisle-group:first-child { margin-top: 2px; }

  /* ---------- Plan composer ---------- */
  .gk-plan { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .gk-composer {
    border-top: 1px solid var(--border-faint);
    background: var(--bg-elevated);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 8px;
  }
  .gk-composer__row { display: flex; gap: 8px; align-items: stretch; }
  .gk-composer__row :where(.gr-input) { flex: 1; }
  .gk-composer__row :where(.gr-btn) { flex: none; width: 48px; padding: 0; }
  .gk-suggest {
    display: flex; align-items: center; gap: 8px;
    width: 100%; text-align: left;
    background: var(--paper-100); border: 1px solid var(--border-default);
    border-radius: var(--radius-md); padding: 8px 10px; cursor: pointer;
    transition: background-color var(--dur-fast) var(--ease-out);
  }
  .gk-suggest:hover { background: var(--paper-200); }
  .gk-suggest__text { font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--ink-900); }

  /* ---------- Shop ---------- */
  .gk-shop { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .gk-shop__filter { padding: 0 12px 10px; }
  .gk-progress {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 10px;
  }

  /* ---------- Tab bar ---------- */
  .gk-tabbar {
    display: flex; border-top: 1px solid var(--border-faint);
    background: var(--bg-elevated);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .gk-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 0 12px; min-height: var(--tap-target);
    border: none; background: transparent; cursor: pointer;
    font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    color: var(--ink-300);
    transition: color var(--dur-fast) var(--ease-out);
  }
  .gk-tab:hover { color: var(--ink-500); }
  .gk-tab.is-active { color: var(--tomato-600); }

  /* ---------- Sign in ---------- */
  .gk-signin {
    height: 100%; display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(110% 60% at 50% 0%, var(--paper-200), transparent 70%),
      var(--bg-page);
  }
  .gk-signin__card {
    width: 100%;
    background: var(--bg-card); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-md);
    padding: 36px 28px 28px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: 16px;
  }
  .gk-signin__tag { margin: 0; color: var(--ink-500); font-size: 15px; max-width: 26ch; }
  .gk-signin__btn { width: 100%; }
  .gk-signin__foot { margin-top: 2px; }
</style>
</head>
<body>
<div class="gk-phone">
  <div id="root"></div>
</div>

<script src="data.js"></script>
<script type="text/babel" src="SignIn.jsx"></script>
<script type="text/babel" src="PlanView.jsx"></script>
<script type="text/babel" src="ShopView.jsx"></script>
<script type="text/babel" src="GroceryApp.jsx"></script>
<script type="text/babel">
  function Root() {
    const [signedIn, setSignedIn] = React.useState(false);
    if (!signedIn) return <window.SignIn onSignIn={() => setSignedIn(true)} />;
    return <window.GroceryApp initialItems={window.GroceryData.ITEMS.map((i) => ({ ...i }))} />;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
