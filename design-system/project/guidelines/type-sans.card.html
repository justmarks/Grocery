<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 11px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-300); width: 130px; flex: none; }
  .spec { font-family: var(--font-sans); color: var(--ink-900); }
</style></head>
<body>
<div class="row"><span class="meta">18 / 600</span><span class="spec" style="font-size:18px;font-weight:600">Yellow onions (3 medium)</span></div>
<div class="row"><span class="meta">16 / 400</span><span class="spec" style="font-size:16px">Add items as you think of them.</span></div>
<div class="row"><span class="meta">14 / 600</span><span class="spec" style="font-size:14px;font-weight:600">Add item</span></div>
<div class="row"><span class="meta">12 / 600 caps</span><span class="spec eyebrow">Shared with 4 members</span></div>
</body></html>
