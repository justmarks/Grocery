<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid; 44px minimum tap target" -->
<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--tomato-300); border-radius: 3px 3px 0 0; width: 26px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-500); }
</style></head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px"></div><span class="lbl">1·4</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="lbl">2·8</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="lbl">3·12</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="lbl">4·16</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="lbl">6·24</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span class="lbl">8·32</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="lbl">12·48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="lbl">16·64</span></div>
  <div class="col"><div class="bar" style="height:44px;background:var(--olive-500);width:44px"></div><span class="lbl">tap·44</span></div>
</div>
</body></html>
