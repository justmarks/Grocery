<!-- @dsCard group="Type" viewport="700x150" name="JetBrains Mono — counts & quantities" subtitle="Tabular numerals for counts, store filters, quantities" -->
<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .qty { font-family: var(--font-mono); font-feature-settings: "tnum"; color: var(--ink-500); background: var(--paper-200); border-radius: var(--radius-sm); padding: 4px 9px; font-size: 13px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-300); }
</style></head>
<body>
<div class="row">
  <span class="qty">×3</span>
  <span class="qty">×12</span>
  <span class="qty">×1</span>
  <span class="meta" style="font-size:14px;color:var(--ink-700)">Trader Joe's · Costco · QFC</span>
</div>
<p class="meta" style="margin-top:18px">Tabular figures keep counts aligned as the list scrolls.</p>
</body></html>
